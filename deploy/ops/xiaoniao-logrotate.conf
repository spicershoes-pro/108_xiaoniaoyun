# /etc/logrotate.d/xiaoniao
# 霄鸟云日志轮转配置
# 安装：cp deploy/ops/xiaoniao-logrotate.conf /etc/logrotate.d/xiaoniao

# ── Nginx 日志 ────────────────────────────────────────────────
/var/log/nginx/buyer-access.log
/var/log/nginx/api-access.log
/var/log/nginx/merchant-access.log
/var/log/nginx/admin-access.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    dateext
    dateformat -%Y%m%d
    sharedscripts
    postrotate
        nginx -s reopen 2>/dev/null || true
    endscript
}

/var/log/nginx/api-error.log
/var/log/nginx/buyer-error.log
/var/log/nginx/merchant-error.log
/var/log/nginx/admin-error.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    dateext
}

# ── 霄鸟云应用日志 ───────────────────────────────────────────
/var/log/xiaoniao/*.log {
    daily
    rotate 60
    compress
    delaycompress
    missingok
    notifempty
    dateext
    dateformat -%Y%m%d
    size 100M
    maxage 60
}

# ── 容器日志（通过 Docker 日志驱动管理，此处为补充）─────────
/var/lib/docker/containers/*/*.log {
    daily
    rotate 7
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
}
