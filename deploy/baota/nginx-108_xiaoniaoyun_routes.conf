# 108_霄鸟云 · 单域名路由（宝塔扩展配置）
# 域名：xiaoniaoyun.dowima.com
# / → 用户端  /merchant/ → 商家端  /admin/ → 管理端  /api/ → PHP API

location = / {
    try_files /index.html =404;
}

location /api/ {
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME /www/wwwroot/xiaoniaoyun.dowima.com/backend/public/index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_param QUERY_STRING $query_string;
    fastcgi_pass unix:/tmp/php-cgi-82.sock;
    fastcgi_read_timeout 120s;
}

location /uploads/ {
    alias /www/wwwroot/xiaoniaoyun.dowima.com/backend/public/uploads/;
    expires 7d;
    access_log off;
}

location /merchant/ {
    root /www/wwwroot/xiaoniaoyun.dowima.com;
    try_files $uri $uri/ /merchant/index.html;
}

location /admin/ {
    root /www/wwwroot/xiaoniaoyun.dowima.com;
    try_files $uri $uri/ /admin/index.html;
}

location / {
    try_files $uri $uri/ /index.html;
}
