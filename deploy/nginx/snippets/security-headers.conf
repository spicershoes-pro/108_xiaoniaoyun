# /etc/nginx/snippets/security-headers.conf
# 安全响应头（所有站点共用）

# 防止 MIME 类型嗅探
add_header X-Content-Type-Options   "nosniff"                  always;

# 防点击劫持（前端 SPA 可改为 SAMEORIGIN）
add_header X-Frame-Options          "SAMEORIGIN"               always;

# XSS 保护（现代浏览器已默认，保留兼容性）
add_header X-XSS-Protection         "1; mode=block"            always;

# Referrer 策略
add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

# 权限策略（禁用不需要的浏览器 API）
add_header Permissions-Policy       "camera=(), microphone=(), geolocation=(), payment=()" always;

# HSTS（强制 HTTPS，注意：首次配置需确认 HTTPS 完全可用再开启）
# max-age=31536000 = 1年；includeSubDomains 包含所有子域；preload 可申请加入 HSTS Preload List
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# CSP 内容安全策略（按实际前端资源来源调整）
# 注意：开发时可能需要放开更多来源
add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://cdn.xiaoniao.com; connect-src 'self' https://api.xiaoniao.com; frame-ancestors 'none';" always;

# 隐藏服务器信息
server_tokens off;
