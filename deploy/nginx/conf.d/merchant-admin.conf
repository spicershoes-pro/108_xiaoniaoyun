# ============================================================
# 霄鸟云 · 宿主机 Nginx 配置 - 商家端（merchant）
# 域名：merchant.xiaoniao.com → 容器端口 5174
# ============================================================

server {
    listen 80;
    server_name merchant.xiaoniao.com;
    include /etc/nginx/snippets/acme-challenge.conf;
    location / { return 301 https://merchant.xiaoniao.com$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name merchant.xiaoniao.com;

    ssl_certificate     /etc/letsencrypt/live/xiaoniao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xiaoniao.com/privkey.pem;
    ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

    include /etc/nginx/snippets/ssl-params.conf;

    access_log /var/log/nginx/merchant-access.log main;
    error_log  /var/log/nginx/merchant-error.log warn;

    include /etc/nginx/snippets/security-headers.conf;

    # 商家后台：仅允许特定 IP 或全开（按需配置）
    # allow 1.2.3.0/24;   # 示例：仅允许公司IP段
    # deny all;

    location / {
        proxy_pass         http://127.0.0.1:5174;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;

        proxy_intercept_errors on;
        error_page 502 503 504 @merchant_down;
    }

    location @merchant_down {
        add_header Content-Type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>维护中</title></head><body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif"><div style="text-align:center"><h2>🏭 商家后台维护中</h2><p>系统升级中，请稍后访问</p></div></body></html>';
    }
}

# ============================================================
# 霄鸟云 · 宿主机 Nginx 配置 - 管理端（admin）
# 域名：admin.xiaoniao.com → 容器端口 5175
# 安全加强：管理后台建议 IP 白名单
# ============================================================

server {
    listen 80;
    server_name admin.xiaoniao.com;
    include /etc/nginx/snippets/acme-challenge.conf;
    location / { return 301 https://admin.xiaoniao.com$request_uri; }
}

server {
    listen 443 ssl http2;
    server_name admin.xiaoniao.com;

    ssl_certificate     /etc/letsencrypt/live/xiaoniao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xiaoniao.com/privkey.pem;
    ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

    include /etc/nginx/snippets/ssl-params.conf;

    access_log /var/log/nginx/admin-access.log main;
    error_log  /var/log/nginx/admin-error.log warn;

    include /etc/nginx/snippets/security-headers.conf;

    # ══ 管理后台安全加固：IP 白名单（强烈推荐） ══════════════
    # 取消以下注释并填写允许访问的 IP/IP段
    # allow 123.123.123.0/24;  # 公司办公网络
    # allow 180.180.180.1;     # 运维VPN出口IP
    # deny  all;               # 其余全部拒绝
    # ═════════════════════════════════════════════════════════

    # 管理后台额外安全头
    add_header X-Robots-Tag "noindex, nofollow, nosnippet, noarchive" always;

    location / {
        proxy_pass         http://127.0.0.1:5175;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;

        proxy_intercept_errors on;
        error_page 502 503 504 @admin_down;
    }

    location @admin_down {
        add_header Content-Type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>维护中</title></head><body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif"><div style="text-align:center"><h2>⚙️ 管理系统维护中</h2><p>系统升级中，请稍后访问</p></div></body></html>';
    }
}
