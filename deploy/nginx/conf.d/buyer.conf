# ============================================================
# 霄鸟云 · 宿主机 Nginx 配置 - 用户端（buyer）
# 文件：/etc/nginx/conf.d/buyer.conf
# 域名：www.xiaoniao.com
# 代理：容器内部端口 5173
# ============================================================

# ── HTTP → HTTPS 强制跳转 ─────────────────────────────────────
server {
    listen 80;
    server_name xiaoniao.com www.xiaoniao.com;

    # ACME 验证（Let's Encrypt 证书续期用）
    include /etc/nginx/snippets/acme-challenge.conf;

    location / {
        return 301 https://www.xiaoniao.com$request_uri;
    }
}

# ── HTTPS 主站 ────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name xiaoniao.com;

    # 非 www 跳转到 www
    ssl_certificate     /etc/letsencrypt/live/xiaoniao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xiaoniao.com/privkey.pem;

    return 301 https://www.xiaoniao.com$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.xiaoniao.com;

    # ── SSL 证书 ──────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/xiaoniao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xiaoniao.com/privkey.pem;
    ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

    include /etc/nginx/snippets/ssl-params.conf;

    # ── 日志 ──────────────────────────────────────────────────
    access_log  /var/log/nginx/buyer-access.log main;
    error_log   /var/log/nginx/buyer-error.log warn;

    # ── 安全头 ────────────────────────────────────────────────
    include /etc/nginx/snippets/security-headers.conf;

    # ── 反向代理到前端容器 ────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade            $http_upgrade;
        proxy_set_header   Connection         "upgrade";
        proxy_set_header   Host               $host;
        proxy_set_header   X-Real-IP          $remote_addr;
        proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto  $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时
        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;
        proxy_send_timeout     30s;

        # SPA：代理失败时返回 index.html（由容器内 Nginx 处理）
        proxy_intercept_errors on;
        error_page 502 503 504 = @maintenance;
    }

    # 维护页面
    location @maintenance {
        add_header Content-Type text/html;
        return 503 '<!DOCTYPE html><html><head><meta charset="utf-8"><title>维护中</title></head><body style="display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif"><div style="text-align:center"><h2>🐦 霄鸟云维护中</h2><p>系统正在升级，请稍后访问</p></div></body></html>';
    }
}
