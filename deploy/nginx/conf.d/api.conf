# ============================================================
# 霄鸟云 · 宿主机 Nginx 配置 - API 后端
# 文件：/etc/nginx/conf.d/api.conf
# 域名：api.xiaoniao.com
# 代理：容器内部端口 8080
# ============================================================

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name api.xiaoniao.com;
    include /etc/nginx/snippets/acme-challenge.conf;
    location / { return 301 https://api.xiaoniao.com$request_uri; }
}

# HTTPS API 服务
server {
    listen 443 ssl http2;
    server_name api.xiaoniao.com;

    ssl_certificate     /etc/letsencrypt/live/xiaoniao.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xiaoniao.com/privkey.pem;
    ssl_dhparam         /etc/nginx/ssl/dhparam.pem;

    include /etc/nginx/snippets/ssl-params.conf;

    access_log  /var/log/nginx/api-access.log main;
    error_log   /var/log/nginx/api-error.log warn;

    include /etc/nginx/snippets/security-headers.conf;

    # API 允许跨域（由后端 PHP 控制，Nginx 不重复设置）
    # 避免重复设置 CORS 头导致浏览器报错

    # ── 请求限制 ──────────────────────────────────────────────
    client_max_body_size  12M;

    # ── 限流：登录接口严格限制 ────────────────────────────────
    location ~* ^/api/auth/(login|send-code) {
        limit_req  zone=login burst=5 nodelay;
        limit_conn perip 10;
        limit_req_status  429;
        limit_conn_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_read_timeout     30s;
    }

    # ── 限流：普通接口 ────────────────────────────────────────
    location /api/ {
        limit_req  zone=api burst=30 nodelay;
        limit_conn perip 50;
        limit_req_status  429;
        limit_conn_status 429;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_read_timeout     60s;
        proxy_send_timeout     30s;

        # 错误处理
        proxy_intercept_errors on;
        error_page 502 503 504 @api_down;
    }

    # ── 上传文件（大文件允许更长超时）────────────────────────
    location /api/upload {
        limit_req  zone=api burst=5 nodelay;
        client_max_body_size 12M;

        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout  10s;
        proxy_read_timeout    120s;  # 上传超时更长
        proxy_send_timeout    120s;
    }

    # ── 健康检查（不限流，供监控使用）───────────────────────
    location = /health {
        access_log off;
        proxy_pass http://127.0.0.1:8080/health;
    }

    # ── 拒绝访问根路径（API域名无前端）─────────────────────
    location = / {
        add_header Content-Type application/json;
        return 200 '{"service":"xiaoniao-api","version":"1.0.0","status":"ok"}';
    }

    # ── 拦截恶意扫描 ──────────────────────────────────────────
    location ~* \.(env|git|sql|bak|old|tmp|conf|ini|log)$ {
        deny all;
        return 444;
    }
    location ~* ^/(\.well-known/acme-challenge/) { allow all; }
    location ~* ^/(wp-admin|wp-login|phpmyadmin|admin\.php) {
        deny all;
        return 444;
    }

    # API 服务不可用时的 JSON 响应
    location @api_down {
        add_header Content-Type application/json;
        return 503 '{"code":-1,"msg":"服务暂时不可用，请稍后重试","data":null}';
    }
}
