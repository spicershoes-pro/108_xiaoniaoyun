# 108_xiaoniaoyun_app_dev ˇ¤ MM-V2-PROD-01 (API :8080, DB via 223:3320)
name: 108_xiaoniaoyun_app_dev

services:
  redis:
    image: redis:7.2-alpine
    container_name: 108_xiaoniaoyun-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASS}
    networks:
      - app
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASS}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  backend:
    image: 108_xiaoniaoyun/backend:dev
    pull_policy: never
    container_name: 108_xiaoniaoyun-backend-dev
    restart: unless-stopped
    environment:
      APP_ENV:              ${APP_ENV:-staging}
      APP_DEBUG:            "false"
      APP_URL:              http://${PUBLIC_HOST:-192.168.1.87}:8080
      DB_HOST:              ${REMOTE_DB_HOST}
      DB_PORT:              ${REMOTE_DB_PORT:-3320}
      DB_NAME:              ${DB_NAME:-xiaoniao}
      DB_USER:              root
      DB_PASS:              ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET:           ${JWT_SECRET}
      SMS_PROVIDER:         mock
      ALLOW_UNIVERSAL_CODE: "true"
      SEED_DATA:            "1"
      REDIS_HOST:           redis
      REDIS_PASS:           ${REDIS_PASS}
      CORS_ORIGINS:         http://${PUBLIC_HOST:-192.168.1.87}:5173,http://${PUBLIC_HOST:-192.168.1.87}:5174,http://${PUBLIC_HOST:-192.168.1.87}:5175
      FORCE_HTTPS:          "false"
      TZ:                   Asia/Shanghai
    volumes:
      - uploads:/var/www/html/public/uploads
      - logs:/var/www/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app

  nginx-api:
    image: nginx:1.25-alpine
    container_name: 108_xiaoniaoyun-nginx-api-dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/conf.d/api-remote.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - app

  frontend-buyer:
    image: 108_xiaoniaoyun/frontend-buyer:dev
    pull_policy: never
    container_name: 108_xiaoniaoyun-buyer-dev
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      - ./docker/nginx/conf.d/frontend-remote.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app

  frontend-merchant:
    image: 108_xiaoniaoyun/frontend-merchant:dev
    pull_policy: never
    container_name: 108_xiaoniaoyun-merchant-dev
    restart: unless-stopped
    ports:
      - "5174:80"
    volumes:
      - ./docker/nginx/conf.d/frontend-remote.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app

  frontend-admin:
    image: 108_xiaoniaoyun/frontend-admin:dev
    pull_policy: never
    container_name: 108_xiaoniaoyun-admin-dev
    restart: unless-stopped
    ports:
      - "5175:80"
    volumes:
      - ./docker/nginx/conf.d/frontend-remote.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app

networks:
  app:
    name: 108_xiaoniaoyun-app-dev-net
    driver: bridge

volumes:
  uploads:
    name: xiaoniao-prod-uploads
  logs:
    name: xiaoniao-prod-logs
