# ============================================================
# 霄鸟云 · Docker Compose 生产环境
# 文件：docker-compose.prod.yml
# 适用：生产部署（配合 Nginx 反向代理 / 负载均衡器）
# 启动：docker compose -f docker-compose.prod.yml up -d
# 注意：所有密钥通过服务器环境变量或 Docker Secrets 注入
# ============================================================

name: 108_xiaoniaoyun

services:

  # ── MySQL（生产通常使用外部 RDS，此处保留可选容器版） ──────
  db:
    image: mysql:8.0
    container_name: 108_xiaoniaoyun-db-prod
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}    # 必须从环境注入
      MYSQL_DATABASE:      ${DB_NAME}
      MYSQL_USER:          ${DB_USER}
      MYSQL_PASSWORD:      ${DB_PASS}
      TZ:                  Asia/Shanghai
    volumes:
      - xn-db-prod:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
      # 生产不挂载 init.sql（数据库已单独初始化）
    # 生产：不对外暴露 DB 端口，仅内部网络访问
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout:  10s
      retries:  5
      start_period: 60s
    networks:
      - xn-internal-prod
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: 108_xiaoniaoyun-redis-prod
    restart: always
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASS}
    volumes:
      - xn-redis-prod:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning",
             "-a", "${REDIS_PASS}", "ping"]
      interval: 30s
      timeout:  5s
      retries:  5
    networks:
      - xn-internal-prod
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── PHP-FPM 后端 ──────────────────────────────────────────
  backend:
    image: 108_xiaoniaoyun/backend:${IMAGE_TAG:-latest}   # 由 CI/CD 注入版本
    container_name: 108_xiaoniaoyun-backend-prod
    restart: always
    environment:
      APP_ENV:     production
      APP_DEBUG:   "false"
      APP_URL:     ${APP_URL}
      DB_HOST:     db
      DB_PORT:     3306
      DB_NAME:     ${DB_NAME}
      DB_USER:     ${DB_USER}
      DB_PASS:     ${DB_PASS}
      JWT_SECRET:  ${JWT_SECRET}
      SMS_PROVIDER:     ${SMS_PROVIDER}
      SMS_ACCESS_KEY:   ${SMS_ACCESS_KEY}
      SMS_SECRET_KEY:   ${SMS_SECRET_KEY}
      SMS_SIGN_NAME:    ${SMS_SIGN_NAME}
      SMS_TEMPLATE_CODE: ${SMS_TEMPLATE_CODE}
      CORS_ORIGINS:     ${CORS_ORIGINS}
      REDIS_HOST:       redis
      REDIS_PASS:       ${REDIS_PASS}
      UPLOAD_DRIVER:    ${UPLOAD_DRIVER:-oss}
      OSS_BUCKET:       ${OSS_BUCKET}
      OSS_ACCESS_KEY:   ${OSS_ACCESS_KEY}
      OSS_SECRET_KEY:   ${OSS_SECRET_KEY}
      OSS_CDN_PREFIX:   ${OSS_CDN_PREFIX}
      LOG_LEVEL:        warning
      ALLOW_UNIVERSAL_CODE: "false"
      FORCE_HTTPS:          "true"
      RATE_LIMIT_PER_MIN:   "120"
      SEED_DATA:            "0"   # 生产禁止自动导入演示数据
      TZ:                   Asia/Shanghai
    volumes:
      - xn-uploads-prod:/var/www/html/public/uploads
      - xn-logs-prod:/var/www/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - xn-internal-prod
    deploy:
      replicas: 2             # 生产 2 个副本（配合上层负载均衡）
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

  # ── Nginx（API代理 + 负载均衡）──────────────────────────────
  nginx-api:
    image: nginx:1.25-alpine
    container_name: 108_xiaoniaoyun-nginx-api-prod
    restart: always
    ports:
      - "8080:80"            # 被上层 Nginx/LB 代理，内部端口
    volumes:
      - ./docker/nginx/conf.d/api.conf:/etc/nginx/conf.d/default.conf:ro
      - xn-uploads-prod:/var/www/html/public/uploads:ro
      - xn-nginx-logs-prod:/var/log/nginx
    depends_on:
      - backend
    networks:
      - xn-internal-prod
      - xn-external-prod

  # ── 用户端 ────────────────────────────────────────────────
  frontend-buyer:
    image: 108_xiaoniaoyun/frontend-buyer:${IMAGE_TAG:-latest}
    container_name: 108_xiaoniaoyun-buyer-prod
    restart: always
    ports:
      - "5173:80"
    volumes:
      - ./docker/nginx/conf.d/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - xn-external-prod

  # ── 商家端 ────────────────────────────────────────────────
  frontend-merchant:
    image: 108_xiaoniaoyun/frontend-merchant:${IMAGE_TAG:-latest}
    container_name: 108_xiaoniaoyun-merchant-prod
    restart: always
    ports:
      - "5174:80"
    volumes:
      - ./docker/nginx/conf.d/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - xn-external-prod

  # ── 管理端 ────────────────────────────────────────────────
  frontend-admin:
    image: 108_xiaoniaoyun/frontend-admin:${IMAGE_TAG:-latest}
    container_name: 108_xiaoniaoyun-admin-prod
    restart: always
    ports:
      - "5175:80"
    volumes:
      - ./docker/nginx/conf.d/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - xn-external-prod

networks:
  xn-internal-prod:
    driver: bridge
    internal: true
  xn-external-prod:
    driver: bridge

volumes:
  xn-db-prod:
    name: 108_xiaoniaoyun-db
  xn-redis-prod:
    name: 108_xiaoniaoyun-redis
  xn-uploads-prod:
    name: 108_xiaoniaoyun-uploads
  xn-logs-prod:
    name: 108_xiaoniaoyun-logs
  xn-nginx-logs-prod:
    name: 108_xiaoniaoyun-nginx-logs
