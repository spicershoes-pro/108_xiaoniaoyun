# ============================================================
# 霄鸟云 · Docker Compose 开发环境
# 文件：docker-compose.yml
# 适用：本地开发 / 功能联调
# 启动：docker compose up -d
# ============================================================

name: 108_xiaoniaoyun_dev

services:

  # ── MySQL 数据库 ───────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: 108_xiaoniaoyun-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD:     ${MYSQL_ROOT_PASSWORD:-XiaoNiaoRoot2026}
      MYSQL_DATABASE:          ${DB_NAME:-xiaoniao_dev}
      MYSQL_USER:              ${DB_USER:-xiaoniao_app}
      MYSQL_PASSWORD:          ${DB_PASS:-XiaoNiao@Dev2026}
      TZ:                      Asia/Shanghai
    ports:
      - "3308:3306"          # 宿主机 3308（3307 常被其他 Docker MySQL 占用）
    volumes:
      - xn-db-data:/var/lib/mysql           # 数据持久化
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost",
             "-u", "root", "--password=${MYSQL_ROOT_PASSWORD:-XiaoNiaoRoot2026}"]
      interval: 10s
      timeout:  5s
      retries:  5
      start_period: 30s
    networks:
      - internal
      - external

  # ── Redis 缓存 ─────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: 108_xiaoniaoyun-redis-dev
    restart: unless-stopped
    command: >
      redis-server /usr/local/etc/redis/redis.conf
      --requirepass ${REDIS_PASS:-XiaoNiaoRedis2026}
    ports:
      - "6379:6379"          # 开发环境暴露端口
    volumes:
      - xn-redis-data:/data                         # AOF 持久化
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning",
             "-a", "${REDIS_PASS:-XiaoNiaoRedis2026}", "ping"]
      interval: 10s
      timeout:  5s
      retries:  5
    networks:
      - internal

  # ── PHP-FPM 后端 ──────────────────────────────────────────
  backend:
    build:
      context:    .
      dockerfile: Dockerfile.backend
      cache_from:
        - 108_xiaoniaoyun/backend:cache
    image: 108_xiaoniaoyun/backend:dev
    container_name: 108_xiaoniaoyun-backend-dev
    restart: unless-stopped
    env_file:
      - backend/.env                        # 本地覆盖（Git忽略）
    environment:
      APP_ENV:          development
      APP_DEBUG:        "true"
      DB_HOST:          db
      DB_PORT:          3306
      DB_NAME:          ${DB_NAME:-xiaoniao_dev}
      DB_USER:          ${DB_USER:-xiaoniao_app}
      DB_PASS:          ${DB_PASS:-XiaoNiao@Dev2026}
      REDIS_HOST:       redis
      REDIS_PASS:       ${REDIS_PASS:-XiaoNiaoRedis2026}
      ALLOW_UNIVERSAL_CODE: "true"
      TZ:               Asia/Shanghai
    volumes:
      # 开发模式：挂载源码，代码修改无需重建镜像
      - ./backend:/var/www/html:cached
      - ./database:/var/www/html/database:cached
      - xn-uploads:/var/www/html/public/uploads
      - xn-logs:/var/www/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD", "php-fpm", "-t"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── Nginx（API代理） ───────────────────────────────────────
  nginx-api:
    image: nginx:1.25-alpine
    container_name: 108_xiaoniaoyun-nginx-api-dev
    restart: unless-stopped
    ports:
      - "8080:80"            # 后端 API 端口
    volumes:
      - ./docker/nginx/conf.d/api.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/public:/var/www/html/public:ro
      - xn-uploads:/var/www/html/public/uploads:ro
      - xn-nginx-logs:/var/log/nginx
    depends_on:
      - backend
    networks:
      - internal
      - external
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout:  10s
      retries:  3

  # ── 用户端（buyer）────────────────────────────────────────
  frontend-buyer:
    build:
      context:    .
      dockerfile: Dockerfile.frontend
      args:
        APP:  buyer
        PORT: 80
      cache_from:
        - 108_xiaoniaoyun/frontend-buyer:cache
    image: 108_xiaoniaoyun/frontend-buyer:dev
    container_name: 108_xiaoniaoyun-buyer-dev
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      # 开发：使用 nginx 服务构建产物（前端开发推荐用 npm run dev 本地运行）
      - ./docker/nginx/conf.d/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nginx-api
    networks:
      - external

  # ── 商家端（merchant）────────────────────────────────────
  frontend-merchant:
    build:
      context:    .
      dockerfile: Dockerfile.frontend
      args:
        APP:  merchant
        PORT: 80
      cache_from:
        - 108_xiaoniaoyun/frontend-merchant:cache
    image: 108_xiaoniaoyun/frontend-merchant:dev
    container_name: 108_xiaoniaoyun-merchant-dev
    restart: unless-stopped
    ports:
      - "5174:80"
    volumes:
      - ./docker/nginx/conf.d/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nginx-api
    networks:
      - external

  # ── 管理端（admin）───────────────────────────────────────
  frontend-admin:
    build:
      context:    .
      dockerfile: Dockerfile.frontend
      args:
        APP:  admin
        PORT: 80
      cache_from:
        - 108_xiaoniaoyun/frontend-admin:cache
    image: 108_xiaoniaoyun/frontend-admin:dev
    container_name: 108_xiaoniaoyun-admin-dev
    restart: unless-stopped
    ports:
      - "5175:80"
    volumes:
      - ./docker/nginx/conf.d/frontend.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nginx-api
    networks:
      - external

# ── 网络 ──────────────────────────────────────────────────────
networks:
  internal:
    name: 108_xiaoniaoyun-dev-internal
    driver: bridge
    internal: true
  external:
    name: 108_xiaoniaoyun-dev-external
    driver: bridge

volumes:
  xn-db-data:
    name: 108_xiaoniaoyun-dev-db
  xn-redis-data:
    name: 108_xiaoniaoyun-dev-redis
  xn-uploads:
    name: 108_xiaoniaoyun-dev-uploads
  xn-logs:
    name: 108_xiaoniaoyun-dev-logs
  xn-nginx-logs:
    name: 108_xiaoniaoyun-dev-nginx-logs
