; docker/php/php-fpm.conf
; PHP-FPM www pool 配置（容器化专用）

[www]
user  = www-data
group = www-data

; 监听地址（供 Nginx fastcgi_pass 使用）
listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; 进程管理模式
pm = dynamic
pm.max_children      = 20
pm.start_servers     = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests      = 500

; 慢日志（超过 3 秒记录）
slowlog            = /var/www/logs/php-fpm-slow.log
request_slowlog_timeout = 3s

; 错误日志
php_admin_value[error_log]  = /var/www/logs/php-fpm-error.log
php_admin_flag[log_errors]  = on

; 环境变量透传（确保容器环境变量传递到 PHP 进程）
clear_env = no

; 安全：禁止访问敏感目录
security.limit_extensions = .php
