# docker/nginx/conf.d/api.conf
# 霄鸟云 API（后端）Nginx 配置
# 反向代理 PHP-FPM，处理 /api/* 路由

server {
    listen      80;
    server_name _;

    root        /var/www/html/public;
    index       index.php;

    # 字符集
    charset utf-8;

    # ── 安全头 ────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"         always;
    add_header X-Frame-Options         "DENY"            always;
    add_header X-XSS-Protection        "1; mode=block"   always;
    add_header Referrer-Policy         "no-referrer-when-downgrade" always;
    # 生产环境建议开启 HSTS（需配合 HTTPS）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 隐藏 Nginx 版本
    server_tokens off;

    # ── 日志 ──────────────────────────────────────────────────
    access_log  /var/log/nginx/api-access.log;
    error_log   /var/log/nginx/api-error.log warn;

    # ── 客户端限制 ────────────────────────────────────────────
    client_max_body_size    12M;
    client_body_timeout     30s;
    client_header_timeout   30s;
    keepalive_timeout       65s;
    send_timeout            30s;

    # ── Gzip 压缩 ─────────────────────────────────────────────
    gzip              on;
    gzip_comp_level   5;
    gzip_min_length   256;
    gzip_types        application/json text/plain text/css application/javascript;
    gzip_vary         on;

    # ── 上传文件静态访问 ──────────────────────────────────────
    location /uploads/ {
        alias     /var/www/html/public/uploads/;
        expires   7d;
        add_header Cache-Control "public, immutable";
        # 禁止执行脚本（安全）
        location ~* \.(php|php5|phtml|sh|cgi)$ {
            deny all;
        }
    }

    # ── 拒绝访问敏感文件 ──────────────────────────────────────
    location ~* \.(env|htaccess|htpasswd|git|svn|sql)$ {
        deny all;
        return 404;
    }

    # ── 主路由：所有请求转给 PHP-FPM ─────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;

        # PHP-FPM upstream（docker-compose service name）
        fastcgi_pass   backend:9000;
        fastcgi_index  index.php;

        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include        fastcgi_params;

        # 超时配置
        fastcgi_connect_timeout  10s;
        fastcgi_send_timeout     30s;
        fastcgi_read_timeout     60s;

        # 缓冲配置
        fastcgi_buffer_size      128k;
        fastcgi_buffers          4 256k;
        fastcgi_busy_buffers_size 256k;

        # 隐藏 PHP 版本
        fastcgi_hide_header X-Powered-By;
    }

    # ── 健康检查接口 ──────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok","service":"api"}';
    }
}
