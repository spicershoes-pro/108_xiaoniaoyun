# docker/nginx/conf.d/frontend.conf
# 霄鸟云前端静态资源服务配置
# 适用：buyer / merchant / admin 三端（按端口区分）
# SPA 路由：所有非文件请求回退到 index.html（History 模式）

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    # ── 安全头 ────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── 日志 ──────────────────────────────────────────────────
    access_log /var/log/nginx/frontend-access.log;
    error_log  /var/log/nginx/frontend-error.log warn;

    # ── Gzip ──────────────────────────────────────────────────
    gzip            on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml
        application/javascript application/json application/xml
        image/svg+xml font/woff font/woff2;
    gzip_vary on;

    # ── 静态资源缓存策略 ──────────────────────────────────────
    # 带内容哈希的 JS/CSS：强缓存 1 年
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 字体/图片：强缓存 30 天
    location ~* \.(?:woff2?|ttf|eot|otf|png|jpg|jpeg|gif|webp|svg|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # index.html：禁止缓存（SPA 入口必须每次更新）
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── SPA 路由（History 模式）────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── 健康检查 ──────────────────────────────────────────────
    location = /health {
        access_log off;
        add_header Content-Type application/json;
        return 200 '{"status":"ok"}';
    }

    # ── 拒绝访问敏感文件 ──────────────────────────────────────
    location ~* \.(env|git|htaccess)$ {
        deny all;
        return 404;
    }
}
