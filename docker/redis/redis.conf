# docker/redis/redis.conf
# Redis 容器配置（开发/测试环境）

# ── 网络 ─────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode yes

# ── 认证（开发可使用弱密码，生产必须强密码并通过环境变量注入）
# requirepass 在 docker-compose 中通过 command 参数传入
# 或使用 Redis 7.x ACL 管理

# ── 持久化（开发：AOF；生产建议 RDB+AOF 双备） ──────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ── 内存 ─────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── 日志 ─────────────────────────────────────────────────────
loglevel notice
logfile ""

# ── 时区（通过环境变量控制，Redis不依赖系统时区） ───────────
# 数据有效期相关逻辑在 PHP 层处理

# ── 慢日志 ───────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ── 安全 ─────────────────────────────────────────────────────
# 禁止危险命令（生产环境建议开启）
# rename-command FLUSHALL ""
# rename-command FLUSHDB  ""
# rename-command CONFIG   ""
# rename-command DEBUG    ""

# ── 连接数 ───────────────────────────────────────────────────
maxclients 100
tcp-keepalive 300
timeout 0
